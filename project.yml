name: Versal
options:
  bundleIdPrefix: com.versal
  deploymentTarget:
    iOS: "17.0"
  generateEmptyDirectories: true

settings:
  base:
    INFOPLIST_FILE: Versal/Info.plist
    ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic

targets:
  Versal:
    type: application
    platform: iOS
    sources:
      - path: Versal
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.versal.app
        INFOPLIST_FILE: Versal/Info.plist
        SWIFT_VERSION: "5.9"
